<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Songo — Mancala africain en ligne</title>
    <meta name="description" content="Jouez au Songo, jeu de stratégie traditionnel d'Afrique centrale. Affrontez des joueurs en ligne, l'IA, ou apprenez les variantes Mpem, Beti et Ngonn." />
    <meta name="keywords" content="Songo, Mpem, Beti, Mancala, jeu africain, jeu gabonais, stratégie, jeu en ligne, jeu traditionnel, Afrique centrale" />
    <meta name="author" content="Songo" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://akong-online.com" />
    <meta name="theme-color" content="#2D3B73" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13110E" media="(prefers-color-scheme: dark)" />

    <!-- PWA: iOS Safari -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Songo" />

    <!-- PWA: Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://akong-online.com" />
    <meta property="og:title" content="Songo — Mancala africain en ligne" />
    <meta property="og:description" content="Jouez au Songo, jeu de stratégie traditionnel d'Afrique centrale. Multijoueur en ligne, IA, leçons et puzzles." />
    <meta property="og:image" content="https://akong-online.com/og-image.png" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://akong-online.com" />
    <meta property="twitter:title" content="Songo — Mancala africain en ligne" />
    <meta property="twitter:description" content="Jouez au Songo, jeu de stratégie traditionnel d'Afrique centrale." />
    <meta property="twitter:image" content="https://akong-online.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Fonts: Fraunces (display) + Geist (UI). Preconnect to avoid FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Geist:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- Theme bootstrap: applies persisted/system theme before paint to avoid flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('songo:theme');
          var pref = stored === 'light' || stored === 'dark' ? stored : 'system';
          var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
